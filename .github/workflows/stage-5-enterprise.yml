name: Stage 5 - Enterprise CI/CD

on:
  push:
    branches: [ stage-5-enterprise ]
  pull_request:
    branches: [ stage-5-enterprise ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: semgrep/semgrep-action@v1
        with:
          config: p/python

  iac-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/
          framework: kubernetes
          soft_fail: true

  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [gateway, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/${{ matrix.service }}/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - run: |
          pip install ruff==0.8.4 mypy==1.13.0
          cd services/${{ matrix.service }} && pip install -r requirements.txt
      - run: |
          ruff check services/${{ matrix.service }}
          mypy services/${{ matrix.service }} --ignore-missing-imports
      - run: cd services/${{ matrix.service }} && pytest -v

  build-sign-sbom:
    runs-on: ubuntu-latest
    needs: [secrets-scan, sast, iac-scan, lint-and-test]
    permissions:
      contents: read
      packages: write
      id-token: write  # OIDC keyless auth for cosign + GHCR
      security-events: write

    strategy:
      matrix:
        service: [gateway, worker]

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      # OIDC-based login — no long-lived credentials stored
      - name: Log in to GHCR via OIDC
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:stage-5
          provenance: true   # SLSA provenance attestation
          sbom: true         # built-in SBOM via buildkit

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Sign image (keyless via OIDC)
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - name: Generate and attach SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json

  # Manual approval gate before production deploy
  approval:
    runs-on: ubuntu-latest
    needs: build-sign-sbom
    if: github.ref == 'refs/heads/stage-5-enterprise'
    environment:
      name: production  # configure required reviewers in GitHub repo settings
    steps:
      - name: Awaiting approval
        run: echo "Approved for production deployment"

  deploy-argocd:
    runs-on: ubuntu-latest
    needs: approval
    if: github.ref == 'refs/heads/stage-5-enterprise'
    permissions:
      contents: write  # to update image tags in GitOps repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags for ArgoCD
        run: |
          cd infrastructure
          for service in gateway worker; do
            sed -i "s|${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${service}:.*|${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${service}:${{ github.sha }}|g" \
              kustomization.yaml
          done

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/kustomization.yaml
          git commit -m "chore: update image tags to ${{ github.sha }}" || echo "No changes to commit"
          git push

      - name: Trigger ArgoCD sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            "${ARGOCD_SERVER}/api/v1/applications/cicd-maturity/sync" \
            -d '{"prune": true}'

  verify-deployment:
    runs-on: ubuntu-latest
    needs: deploy-argocd
    if: github.ref == 'refs/heads/stage-5-enterprise'
    steps:
      - name: Wait for ArgoCD sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
              "${ARGOCD_SERVER}/api/v1/applications/cicd-maturity" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status']['sync']['status'])")
            echo "Sync status: $STATUS"
            [ "$STATUS" = "Synced" ] && exit 0
            sleep 10
          done
          echo "ArgoCD sync timed out" && exit 1

      - name: Verify Falco is running (runtime security)
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          kubectl get pods -n falco -l app=falco --field-selector=status.phase=Running | grep -q falco || \
            echo "WARNING: Falco not detected — runtime security monitoring may be inactive"
