apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cicd-maturity
  namespace: argocd
spec:
  project: default
  
  source:
    repoURL: https://github.com/ibraheemcisse/CICD-Maturity.git
    targetRevision: HEAD
    path: infrastructure
  
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    
    syncOptions:
    - CreateNamespace=true
    
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
