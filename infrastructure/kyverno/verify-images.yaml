apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
spec:
  validationFailureAction: Enforce
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-signature
      match:
        any:
        - resources:
            kinds:
              - Pod
      verifyImages:
      - imageReferences:
        - "ghcr.io/ibraheemcisse/*:*"
        attestors:
        - count: 1
          entries:
          - keyless:
              subject: "https://github.com/ibraheemcisse/CICD-Maturity/.github/workflows/stage-4-trusted.yml@refs/heads/stage-4-trusted"
              issuer: "https://token.actions.githubusercontent.com"
              rekor:
                url: https://rekor.sigstore.dev
